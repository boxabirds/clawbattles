<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWARM — POC 10</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'SystemUI';
      src: local('Segoe UI'), local('system-ui'), local('Helvetica Neue'), local('Arial');
    }

    body {
      background: #0a0a12;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Three.js canvas ─────────────────────────────── */
    #viewport {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Screen overlays ─────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
    }
    .screen.active { display: flex; }

    /* ── Menu Screen ─────────────────────────────────── */
    #menu-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, rgba(20, 20, 50, 0.9) 0%, rgba(10, 10, 18, 0.98) 70%);
    }

    .menu-title {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: 16px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff 0%, #6c63ff 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      text-shadow: 0 0 60px rgba(108, 99, 255, 0.3);
    }

    .menu-subtitle {
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 80px;
    }

    .menu-buttons {
      display: flex;
      gap: 24px;
    }

    .menu-btn {
      padding: 20px 60px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      border: 2px solid;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .menu-btn:hover::before { opacity: 1; }

    .menu-btn.teams {
      background: rgba(52, 211, 153, 0.1);
      border-color: #34d399;
      color: #34d399;
    }
    .menu-btn.teams::before { background: rgba(52, 211, 153, 0.15); }
    .menu-btn.teams:hover {
      box-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
      transform: translateY(-2px);
    }

    .menu-btn.arena {
      background: rgba(248, 113, 113, 0.1);
      border-color: #f87171;
      color: #f87171;
    }
    .menu-btn.arena::before { background: rgba(248, 113, 113, 0.15); }
    .menu-btn.arena:hover {
      box-shadow: 0 0 30px rgba(248, 113, 113, 0.3);
      transform: translateY(-2px);
    }

    /* ── Teams Screen ────────────────────────────────── */
    #teams-screen {
      flex-direction: column;
      background: rgba(10, 10, 18, 0.92);
    }

    .teams-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .teams-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #34d399;
    }

    .back-btn {
      padding: 8px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }

    .team-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      padding: 2px;
    }

    .team-cell {
      background: rgba(15, 15, 30, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .team-cell:hover {
      border-color: rgba(108, 99, 255, 0.4);
      background: rgba(20, 20, 45, 0.9);
    }
    .team-cell.selected {
      border-color: #6c63ff;
      box-shadow: inset 0 0 30px rgba(108, 99, 255, 0.1);
    }

    .cell-canvas {
      width: 100%;
      height: 70%;
    }

    .cell-info {
      padding: 8px 16px;
      text-align: center;
      width: 100%;
    }

    .cell-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e0e0e0;
      margin-bottom: 4px;
    }

    .cell-stats {
      font-size: 11px;
      color: #666;
      letter-spacing: 1px;
    }

    .cell-edit-hint {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .team-cell:hover .cell-edit-hint { opacity: 1; }

    /* ── Editor Screen ───────────────────────────────── */
    #editor-screen {
      background: transparent;
    }

    .editor-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .editor-left {
      width: 180px;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
      background: rgba(10, 10, 18, 0.95);
    }

    .editor-viewport {
      flex: 1;
      position: relative;
      /* Transparent — lets the #viewport canvas show through */
    }

    .editor-right {
      width: 200px;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
      background: rgba(10, 10, 18, 0.95);
    }

    .editor-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      z-index: 20;
      pointer-events: none;
    }
    .editor-top-bar > * { pointer-events: auto; }

    .editor-back-btn {
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }

    .symmetry-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #666;
    }
    .symmetry-badge.on {
      color: #00e5ff;
      border-color: rgba(0, 229, 255, 0.3);
      background: rgba(0, 229, 255, 0.08);
    }

    /* Part buttons */
    .part-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .part-section-title:first-child { margin-top: 0; }

    .part-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 3px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .part-btn:hover {
      background: rgba(108, 99, 255, 0.1);
      border-color: rgba(108, 99, 255, 0.3);
      color: #ddd;
    }
    .part-btn.active {
      background: rgba(108, 99, 255, 0.2);
      border-color: #6c63ff;
      color: #fff;
    }

    .part-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .part-cost {
      margin-left: auto;
      font-size: 10px;
      color: #555;
      background: rgba(255, 255, 255, 0.05);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Stats panel */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      min-width: 60px;
    }

    .stat-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.2s;
    }

    .stat-value {
      font-size: 11px;
      font-weight: 600;
      color: #ccc;
      min-width: 30px;
      text-align: right;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }

    .action-btn {
      width: 100%;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn.primary {
      background: rgba(108, 99, 255, 0.2);
      border: 1px solid #6c63ff;
      color: #a78bfa;
    }
    .action-btn.primary:hover { background: rgba(108, 99, 255, 0.35); }

    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #888;
    }
    .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ccc;
    }

    /* ── Arena Screen ────────────────────────────────── */
    #arena-screen {
      flex-direction: column;
    }

    .arena-hud {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }
    .arena-hud > * { pointer-events: auto; }

    .arena-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .arena-timer {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      letter-spacing: 2px;
    }

    .arena-back-btn {
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .arena-back-btn:hover { color: #ccc; background: rgba(0, 0, 0, 0.6); }

    .health-bars {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
    }

    .health-bar {
      width: 120px;
      text-align: center;
    }

    .health-bar-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .health-bar-bg {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .health-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.15s;
    }

    .kill-feed {
      position: absolute;
      top: 60px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kill-entry {
      font-size: 11px;
      color: #888;
      padding: 4px 10px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      white-space: nowrap;
      animation: kill-fade-in 0.2s ease-out;
    }

    @keyframes kill-fade-in {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .winner-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 20;
    }
    .winner-overlay.active { display: flex; }

    .winner-text {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .winner-subtitle {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
    }

    /* ── Transition overlay ──────────────────────────── */
    #transition-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 6px;
      font-size: 13px;
      color: #ccc;
      z-index: 200;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="viewport"></canvas>

    <!-- Menu Screen -->
    <div id="menu-screen" class="screen active">
      <div class="menu-title">SWARM</div>
      <div class="menu-subtitle">Creature Arena</div>
      <div class="menu-buttons">
        <button class="menu-btn teams" id="btn-teams">Teams</button>
        <button class="menu-btn arena" id="btn-arena">Arena</button>
      </div>
    </div>

    <!-- Teams Screen -->
    <div id="teams-screen" class="screen">
      <div class="teams-header">
        <span class="teams-title">Your Team</span>
        <button class="back-btn" id="btn-teams-back">Back</button>
      </div>
      <div class="team-grid" id="team-grid">
        <!-- 4 cells generated by JS -->
      </div>
    </div>

    <!-- Editor Screen -->
    <div id="editor-screen" class="screen">
      <div class="editor-layout">
        <div class="editor-left" id="editor-parts-panel">
          <!-- Part buttons generated by JS -->
        </div>
        <div class="editor-viewport" id="editor-viewport">
          <div class="editor-top-bar">
            <button class="editor-back-btn" id="btn-editor-back">Back</button>
            <div class="symmetry-badge" id="symmetry-badge">Symmetry: OFF [S]</div>
          </div>
        </div>
        <div class="editor-right" id="editor-stats-panel">
          <!-- Stats generated by JS -->
        </div>
      </div>
    </div>

    <!-- Arena Screen -->
    <div id="arena-screen" class="screen">
      <div class="arena-hud">
        <div class="arena-top-bar">
          <button class="arena-back-btn" id="btn-arena-back">Back</button>
          <div class="arena-timer" id="arena-timer">0:00</div>
        </div>
        <div class="health-bars" id="health-bars">
          <!-- Generated by JS -->
        </div>
        <div class="kill-feed" id="kill-feed"></div>
        <div class="winner-overlay" id="winner-overlay">
          <div class="winner-text" id="winner-text">Victory</div>
          <div class="winner-subtitle">Press any key to continue</div>
        </div>
      </div>
    </div>

    <div id="transition-overlay"></div>
    <div id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
