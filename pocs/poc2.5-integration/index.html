<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POC 2.5: SpacetimeDB + Three.js Integration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10; color: #e0e0e0;
      background: rgba(10,10,30,0.85); padding: 16px 20px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1); min-width: 280px;
      backdrop-filter: blur(8px); font-size: 13px;
    }
    #hud h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 10px; }
    .stat { margin: 4px 0; }
    .stat label { color: #888; }
    .stat value { color: #4ade80; font-weight: 600; }
    #conn-status { font-weight: 600; }
    #event-log {
      position: fixed; bottom: 16px; left: 16px; z-index: 10; color: #aaa;
      background: rgba(10,10,30,0.85); padding: 12px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1); max-width: 400px; max-height: 200px;
      overflow-y: auto; font-size: 11px; font-family: monospace; line-height: 1.6;
      backdrop-filter: blur(8px);
    }
    #controls-hint {
      position: fixed; bottom: 16px; right: 16px; z-index: 10; color: #555;
      font-size: 11px; text-align: right; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h2>POC 2.5: SpacetimeDB + Three.js</h2>
    <div class="stat"><label>Connection: </label><span id="conn-status" style="color:#f87171">Connecting...</span></div>
    <div class="stat"><label>Players: </label><span id="player-count">0</span></div>
    <div class="stat"><label>Creatures: </label><span id="creature-count">0</span></div>
    <div class="stat"><label>FPS: </label><span id="fps-display">--</span></div>
  </div>
  <div id="event-log"></div>
  <div id="controls-hint">
    Left-click ground: spawn creature<br>
    Right-click creature: select<br>
    Right-click ground: move selected<br>
    Drag: orbit &middot; Scroll: zoom
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
