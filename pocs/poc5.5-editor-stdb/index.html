<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POC 5.5: Creature Editor + SpacetimeDB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ---- Top bar ---- */
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(10, 10, 30, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 20;
      flex-shrink: 0;
    }
    #top-bar h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #top-bar h1 span { color: #4fc3f7; }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #conn-status {
      font-size: 12px;
      font-weight: 600;
    }
    #deploy-btn {
      background: #4fc3f7;
      color: #0a0a1e;
      border: none;
      padding: 6px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #deploy-btn:hover { background: #81d4fa; }
    #deploy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- Main layout ---- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- Left panel ---- */
    #left-panel {
      width: 180px;
      flex-shrink: 0;
      background: rgba(10, 10, 30, 0.9);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
    }

    .panel-section {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .panel-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #666;
      margin-bottom: 8px;
    }

    .part-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 3px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
    }
    .part-btn:hover {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.3);
      color: #fff;
    }
    .part-btn.active {
      background: rgba(79, 195, 247, 0.2);
      border-color: #4fc3f7;
      color: #4fc3f7;
    }
    .part-btn .cost-badge {
      margin-left: auto;
      font-size: 10px;
      color: #888;
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .part-btn .part-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .design-btn {
      display: block;
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 3px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .design-btn:hover {
      background: rgba(79, 195, 247, 0.12);
      color: #fff;
    }

    /* ---- Viewport ---- */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #viewport canvas { display: block; }

    #symmetry-badge {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 1px;
      color: #888;
      pointer-events: none;
      transition: color 0.2s, border-color 0.2s;
      z-index: 5;
    }
    #symmetry-badge.on {
      color: #4fc3f7;
      border-color: rgba(79, 195, 247, 0.4);
    }

    #hint-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.75);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 11px;
      color: #777;
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
    }

    /* ---- Right panel ---- */
    #right-panel {
      width: 220px;
      flex-shrink: 0;
      background: rgba(10, 10, 30, 0.9);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .stat-row label { color: #888; }
    .stat-row .value { font-weight: 600; color: #e0e0e0; }

    .stat-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 5px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:hover {
      background: rgba(79, 195, 247, 0.15);
      border-color: rgba(79, 195, 247, 0.3);
      color: #fff;
    }
    .action-btn.primary {
      background: rgba(79, 195, 247, 0.18);
      border-color: rgba(79, 195, 247, 0.35);
      color: #4fc3f7;
    }
    .action-btn.save {
      background: rgba(76, 175, 80, 0.18);
      border-color: rgba(76, 175, 80, 0.35);
      color: #66bb6a;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #timer-display {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      color: #4fc3f7;
      margin-bottom: 2px;
      font-variant-numeric: tabular-nums;
    }
    #timer-label {
      font-size: 10px;
      text-align: center;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* ---- My Creatures panel ---- */
    .creature-card {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .creature-card:hover {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.3);
    }
    .creature-card.deployed {
      border-color: rgba(76, 175, 80, 0.5);
      background: rgba(76, 175, 80, 0.1);
    }
    .creature-card .card-name {
      font-size: 12px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 2px;
    }
    .creature-card .card-meta {
      font-size: 10px;
      color: #888;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .creature-card .deploy-badge {
      font-size: 9px;
      background: rgba(76, 175, 80, 0.3);
      color: #66bb6a;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .creature-card .card-actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .creature-card .card-actions button {
      padding: 2px 6px;
      font-size: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .creature-card .card-actions button:hover {
      background: rgba(79, 195, 247, 0.15);
      color: #fff;
    }
    .creature-card .card-actions button.delete-btn:hover {
      background: rgba(244, 67, 54, 0.2);
      border-color: rgba(244, 67, 54, 0.4);
      color: #ef5350;
    }

    /* ---- Community section ---- */
    .community-card {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .community-card:hover {
      background: rgba(171, 71, 188, 0.1);
      border-color: rgba(171, 71, 188, 0.3);
    }
    .community-card .card-name {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
    }
    .community-card .card-meta {
      font-size: 10px;
      color: #666;
    }

    /* ---- Name input ---- */
    #creature-name-input {
      width: 100%;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      margin-bottom: 6px;
    }
    #creature-name-input:focus {
      border-color: rgba(79, 195, 247, 0.5);
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(79, 195, 247, 0.9);
      color: #0a0a1e;
      padding: 8px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="top-bar">
  <h1><span>SWARM</span> &mdash; Creature Designer</h1>
  <div class="top-bar-right">
    <span id="conn-status" style="color:#f87171">Connecting...</span>
    <button id="deploy-btn" disabled>Deploy</button>
  </div>
</div>

<!-- Main layout -->
<div id="main">

  <!-- Left panel: parts + preset designs -->
  <div id="left-panel">
    <div class="panel-section" id="parts-section">
      <h3>Parts</h3>
      <!-- populated by JS -->
    </div>
    <div class="panel-section" id="designs-section">
      <h3>Presets</h3>
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Viewport -->
  <div id="viewport">
    <div id="symmetry-badge">Symmetry: OFF &middot; [S]</div>
    <div id="hint-bar">Click part to select &middot; Click port to attach &middot; Right-click or [Del] to remove &middot; [S] symmetry</div>
  </div>

  <!-- Right panel: stats + actions + saved creatures -->
  <div id="right-panel">
    <div class="panel-section">
      <h3>Build Timer</h3>
      <div id="timer-display">0.0s</div>
      <div id="timer-label">Time to build</div>
    </div>
    <div class="panel-section" id="stats-section">
      <h3>Stats</h3>
    </div>
    <div class="panel-section" id="locomotion-section">
      <h3>Locomotion</h3>
    </div>
    <div class="panel-section" id="actions-section">
      <h3>Actions</h3>
      <button class="action-btn primary" id="btn-test-walk">Test Walk</button>
      <button class="action-btn" id="btn-undo">Undo</button>
      <button class="action-btn" id="btn-clear">Clear All</button>
      <button class="action-btn" id="btn-export">Export JSON</button>
    </div>
    <div class="panel-section" id="save-section">
      <h3>Save to Cloud</h3>
      <input type="text" id="creature-name-input" placeholder="Creature name..." maxlength="32">
      <button class="action-btn save" id="btn-save" disabled>Save Creature</button>
      <button class="action-btn" id="btn-update" style="display:none">Update Current</button>
    </div>
    <div class="panel-section" id="my-creatures-section">
      <h3>My Creatures</h3>
      <div id="my-creatures-list">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="panel-section" id="community-section">
      <h3>Community (Deployed)</h3>
      <div id="community-list">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
