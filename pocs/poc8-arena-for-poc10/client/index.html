<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawWorld Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #eee; font-family: 'Courier New', monospace; overflow: hidden; }
    #app { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    /* HUD overlay — minimal */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }

    /* Health panel: top-left floating roster */
    #alive-dots {
      position: absolute; top: 16px; left: 16px;
      display: flex; gap: 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      padding: 10px 14px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .team-group {
      display: flex; flex-direction: column; gap: 3px;
    }
    .hp-row {
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.6s ease;
    }
    .hp-row.dead {
      opacity: 0.25;
    }
    .hp-row.dead .hp-fill {
      width: 0% !important;
    }
    .hp-name {
      font-size: 10px; color: #aaa;
      width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hp-track {
      width: 50px; height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px; overflow: hidden;
    }
    .hp-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.15s ease;
    }
    /* Critical health glow */
    .hp-row.critical .hp-fill {
      background: #ff2020 !important;
      box-shadow: 0 0 6px #ff2020, 0 0 12px rgba(255, 32, 32, 0.5);
    }
    .hp-row.critical .hp-name {
      color: #ff4040;
      text-shadow: 0 0 6px rgba(255, 32, 32, 0.6);
    }

    @keyframes critical-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .hp-row.critical .hp-fill {
      animation: critical-pulse 0.8s ease-in-out infinite;
    }

    /* Kill feed — cinematic style */
    #kill-feed {
      position: absolute; bottom: 24px; left: 24px;
      font-size: 14px; max-height: 200px; overflow: hidden;
    }
    .kill-msg {
      padding: 3px 0;
      text-shadow: 0 0 8px currentColor;
      opacity: 0.95;
      transition: opacity 0.5s ease;
    }
    .kill-msg.fade { opacity: 0.3; }

    /* Match overlay (pre-match intro, winner) */
    #match-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    #match-overlay.visible { opacity: 1; }
    #match-overlay .text {
      font-size: 48px; font-weight: bold;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      letter-spacing: 4px;
    }

    /* Setup panel */
    #setup-panel {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95); border: 1px solid #333; padding: 24px;
      min-width: 360px; z-index: 20; pointer-events: auto;
    }
    #setup-panel h2 { margin-bottom: 16px; color: #aaa; font-size: 18px; letter-spacing: 2px; }
    #setup-panel .design-list { margin-bottom: 16px; max-height: 300px; overflow-y: auto; }
    .design-item {
      display: flex; align-items: center; padding: 6px 8px; cursor: pointer;
      border: 1px solid #222; margin-bottom: 4px;
    }
    .design-item:hover { border-color: #555; }
    .design-item.selected { border-color: #fff; background: rgba(255,255,255,0.03); }
    .design-item .idx {
      width: 24px; height: 24px; border-radius: 50%; margin-right: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: bold;
    }
    #start-btn {
      width: 100%; padding: 10px; background: #fff; color: #000; border: none;
      font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer;
      letter-spacing: 1px;
    }
    #start-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
    #start-btn:hover:not(:disabled) { background: #ddd; }
    .connection-status { font-size: 11px; color: #555; margin-bottom: 12px; }

    /* Match info HUD — top center */
    #match-info {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex; gap: 12px; align-items: center;
      font-size: 13px;
    }
    #round-label {
      color: #aaa; letter-spacing: 1px;
    }
    #timer-label {
      color: #fff; font-weight: bold; letter-spacing: 0.5px;
      min-width: 32px; text-align: center;
    }
    #timer-label.urgent {
      color: #ff4040;
      text-shadow: 0 0 8px rgba(255, 64, 64, 0.6);
      animation: critical-pulse 0.8s ease-in-out infinite;
    }

    /* Floating control panel */
    #control-panel {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0, 0, 0, 0.7); border: 1px solid #333;
      padding: 10px 14px; z-index: 15; pointer-events: auto;
      display: flex; gap: 10px; align-items: center;
      backdrop-filter: blur(4px); border-radius: 4px;
    }
    #control-panel button {
      background: rgba(255, 255, 255, 0.08); border: 1px solid #444;
      color: #ccc; font-family: inherit; font-size: 12px;
      padding: 5px 12px; cursor: pointer; letter-spacing: 0.5px;
      border-radius: 2px; transition: background 0.15s, border-color 0.15s;
    }
    #control-panel button:hover { background: rgba(255, 255, 255, 0.15); border-color: #666; }
    #control-panel button.active { border-color: #fff; color: #fff; background: rgba(255, 255, 255, 0.12); }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="alive-dots"></div>
      <div id="match-info">
        <span id="round-label">ROUND 1</span>
        <span id="timer-label">60s</span>
      </div>
      <div id="kill-feed"></div>
      <div id="match-overlay"><div class="text" id="overlay-text"></div></div>
      <div id="control-panel">
        <button id="btn-autopan" class="active">AUTOPAN</button>
        <button id="btn-restart">RESTART</button>
        <button id="btn-sound">SND: OFF</button>
      </div>
    </div>

    <div id="setup-panel" style="display:none;">
      <h2>CLAWWORLD ARENA</h2>
      <div class="connection-status" id="conn-status">Connecting...</div>
      <div class="design-list" id="design-list"></div>
      <button id="start-btn" disabled>SELECT 16 CREATURES TO FIGHT</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
